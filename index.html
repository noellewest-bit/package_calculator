<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wedding Entourage Package Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Loading inventory data…</div>
  </div>

  <h1>Wedding Entourage Package Calculator</h1>

  <!-- PACKAGE SELECTOR -->
  <div class="section">
    <h3>Package</h3>
    <div style="display:grid;gap:10px;">
      <select id="packageType">
        <option value="5200">PACKAGE 1C (SPANDEX)</option>
        <option value="6200">PACKAGE 2C (CHIFFON)</option>
        <option value="7000">PACKAGE 3C (SPANDEX)</option>
        <option value="8200">PACKAGE 4C (CHIFFON)</option>
      </select>
      <select id="packageColor">
        <option value="">— Select Package Color —</option>
      </select>
    </div>
  </div>

  <!-- PACKAGE ITEMS -->
  <div class="section">
    <h3>Package Items</h3>
    <div class="pkg-header">
      <div>Item</div>
      <div>Qty</div>
      <div>Unit Price</div>
      <div>Subtotal</div>
    </div>
    <div id="itemRows"></div>
  </div>

  <!-- ADD-ONS -->
  <div class="section">
    <h3>Add-On Items <span style="font-weight:400;color:#b08a50;font-size:0.75rem;">(20% OFF Regular Rate)</span></h3>
    <div class="addon-header">
      <div>Category</div>
      <div>Item Code</div>
      <div>Qty</div>
      <div>Regular</div>
      <div>Charged</div>
      <div></div>
    </div>
    <div id="addonRows"></div>
    <button class="btn-add" id="addAddonBtn">+ Add Item</button>
  </div>

  <!-- TOTALS -->
  <div class="totals">
    <div class="total-row"><span>Package Subtotal</span><span>₱<span id="packageSubtotal">0.00</span></span></div>
    <div class="total-row"><span>Add-On Subtotal</span><span>₱<span id="addonSubtotal">0.00</span></span></div>
    <div class="total-row grand"><span>Grand Total</span><span>₱<span id="grandTotal">0.00</span></span></div>
  </div>

  <script src="app.js"></script>

</body>
</html>
